<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Content Studio AI</title>
    <script crossorigin src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,400;0,600;1,400;1,600&family=Poppins:wght@400;500;600&display=swap" rel="stylesheet">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body.light-mode { font-family: 'Poppins', sans-serif; background: #faf9f7; color: #1a1a1a; line-height: 1.6; transition: background 0.3s ease, color 0.3s ease; }
        body.dark-mode { font-family: 'Poppins', sans-serif; background: #1e1e1e; color: #f0ede8; line-height: 1.6; transition: background 0.3s ease, color 0.3s ease; }
        h1, h2, h3, h4 { font-family: 'Cormorant Garamond', serif; font-weight: 600; }

        /* HEADER */
        .header { background: inherit; border-bottom: 1px solid rgba(139,21,56,0.08); padding: 1.25rem 1.5rem; display: flex; justify-content: space-between; align-items: center; position: sticky; top: 0; z-index: 100; backdrop-filter: blur(10px); }
        .dark-mode .header { border-color: rgba(139,21,56,0.15); }
        .logo { font-size: 20px; font-weight: 600; letter-spacing: 1px; font-family: 'Cormorant Garamond', serif; color: #8B1538; }
        .header-actions { display: flex; align-items: center; gap: 0.75rem; }
        .mode-toggle { background: none; border: none; font-size: 18px; cursor: pointer; padding: 6px; transition: transform 0.3s ease; }
        .mode-toggle:hover { transform: scale(1.15); }
        .profile-btn { background: linear-gradient(135deg, #8B1538, #c41e3a); color: white; border: none; width: 34px; height: 34px; border-radius: 50%; cursor: pointer; font-size: 14px; font-weight: 600; font-family: 'Poppins', sans-serif; display: flex; align-items: center; justify-content: center; transition: all 0.3s; }
        .profile-btn:hover { transform: scale(1.05); box-shadow: 0 4px 12px rgba(139,21,56,0.3); }

        /* LANDING NAV */
        .landing-nav { display: flex; gap: 1.5rem; align-items: center; }
        .nav-link { text-decoration: none; font-size: 14px; font-weight: 500; cursor: pointer; border: none; background: transparent; padding: 8px 0; border-bottom: 2px solid transparent; transition: all 0.3s; color: #666; }
        .dark-mode .nav-link { color: #aaa; }
        .nav-link:hover { color: #8B1538; }

        /* BOTTOM NAV */
        .bottom-nav { position: fixed; bottom: 0; left: 0; right: 0; background: white; border-top: 1px solid rgba(139,21,56,0.1); display: flex; z-index: 200; padding-bottom: env(safe-area-inset-bottom, 8px); box-shadow: 0 -4px 20px rgba(0,0,0,0.06); }
        .dark-mode .bottom-nav { background: #1e1e1e; border-top-color: rgba(139,21,56,0.2); box-shadow: 0 -4px 20px rgba(0,0,0,0.3); }
        .bottom-nav-item { flex: 1; display: flex; flex-direction: column; align-items: center; justify-content: center; padding: 10px 4px 12px; cursor: pointer; background: none; border: none; color: #999; font-size: 10px; font-family: 'Poppins', sans-serif; font-weight: 500; gap: 3px; transition: all 0.3s; letter-spacing: 0.2px; }
        .bottom-nav-icon { font-size: 20px; line-height: 1; }
        .bottom-nav-item.active { color: #8B1538; }
        .bottom-nav-item.active .bottom-nav-icon { transform: scale(1.1); }

        /* APP CONTENT */
        .app-content { padding-bottom: 80px; min-height: 100vh; }

        /* BUTTONS */
        .btn { background: #1a1a1a; color: white; border: none; padding: 12px 28px; font-size: 14px; font-weight: 600; border-radius: 10px; cursor: pointer; transition: all 0.3s; margin: 0 0.5rem; font-family: 'Poppins', sans-serif; }
        .btn:hover { background: #333; transform: translateY(-1px); }
        .btn:disabled { background: #ccc; cursor: not-allowed; transform: none; }
        .btn-secondary { background: transparent; color: #1a1a1a; border: 1.5px solid #ddd; }
        .dark-mode .btn-secondary { color: #f0ede8; border-color: #4a4a4a; }
        .btn-secondary:hover { border-color: #8B1538; background: rgba(139,21,56,0.05); }
        .btn-crimson { background: linear-gradient(135deg, #8B1538, #c41e3a); color: white; box-shadow: 0 4px 15px rgba(139,21,56,0.25); }
        .btn-crimson:hover { box-shadow: 0 6px 20px rgba(139,21,56,0.35); background: linear-gradient(135deg, #7a1230, #b01832); }
        .btn-small { padding: 8px 16px; font-size: 13px; }

        /* LANDING PAGE */
        .hero { background: linear-gradient(160deg, #faf9f7 0%, #fff5f5 50%, #faf9f7 100%); padding: 6rem 2rem; text-align: center; border-bottom: 1px solid rgba(139,21,56,0.08); }
        .dark-mode .hero { background: linear-gradient(160deg, #1e1e1e 0%, #2a1a1e 50%, #1e1e1e 100%); border-bottom-color: rgba(139,21,56,0.15); }
        .hero h1 { margin-bottom: 0.75rem; letter-spacing: -1px; font-size: 52px; }
        .hero-sub { font-size: 18px; margin-bottom: 2.5rem; color: #777; max-width: 600px; margin-left: auto; margin-right: auto; line-height: 1.7; }
        .dark-mode .hero-sub { color: #aaa; }
        .hero-crimson { color: #8B1538; font-style: italic; }
        .features { display: grid; grid-template-columns: repeat(auto-fit, minmax(280px, 1fr)); gap: 2.5rem; padding: 5rem 2rem; max-width: 1100px; margin: 0 auto; }
        .feature-card { text-align: center; padding: 1rem; }
        .feature-icon { font-size: 44px; margin-bottom: 1.25rem; }
        .feature-card h3 { margin-bottom: 0.5rem; font-size: 22px; }
        .feature-card p { color: #777; font-size: 14px; line-height: 1.7; }
        .dark-mode .feature-card p { color: #aaa; }
        .email-section { background: rgba(139,21,56,0.03); padding: 4rem 2rem; text-align: center; border-top: 1px solid rgba(139,21,56,0.08); border-bottom: 1px solid rgba(139,21,56,0.08); }
        .dark-mode .email-section { background: rgba(139,21,56,0.06); }
        .email-section h2 { font-size: 30px; margin-bottom: 0.5rem; }
        .email-section p { color: #777; margin-bottom: 1.5rem; font-size: 15px; }
        .dark-mode .email-section p { color: #aaa; }
        .email-form { display: flex; gap: 0.5rem; max-width: 480px; margin: 0 auto; flex-wrap: wrap; justify-content: center; }
        .email-form input { flex: 1; min-width: 200px; padding: 12px 16px; border: 1.5px solid #e0e0e0; border-radius: 10px; font-size: 14px; background: white; color: #1a1a1a; font-family: 'Poppins', sans-serif; }
        .dark-mode .email-form input { background: #2a2a2a; border-color: #4a4a4a; color: #f0ede8; }
        .email-form input:focus { outline: none; border-color: #8B1538; }
        .email-form button { background: #8B1538; color: white; border: none; padding: 12px 24px; border-radius: 10px; cursor: pointer; font-weight: 600; font-family: 'Poppins', sans-serif; transition: all 0.3s; }
        .email-form button:hover { background: #6b0f2b; }
        .pricing { padding: 5rem 2rem; }
        .pricing h2 { text-align: center; margin-bottom: 3rem; font-size: 38px; }
        .pricing-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(280px, 1fr)); gap: 2rem; max-width: 800px; margin: 0 auto; }
        .pricing-card { background: white; padding: 2.5rem; border-radius: 16px; text-align: center; border: 1.5px solid #e8e8e8; transition: all 0.3s; }
        .dark-mode .pricing-card { background: #2a2a2a; border-color: #3a3a3a; }
        .pricing-card:hover { border-color: #8B1538; box-shadow: 0 8px 30px rgba(139,21,56,0.12); transform: translateY(-2px); }
        .pricing-card.featured { border-color: #8B1538; box-shadow: 0 8px 30px rgba(139,21,56,0.15); }
        .pricing-card h3 { font-size: 22px; margin-bottom: 1rem; }
        .price { font-size: 48px; font-weight: 700; color: #8B1538; }
        .price-per { font-size: 14px; color: #999; margin-bottom: 1.5rem; }
        .pricing-list { list-style: none; margin: 1.5rem 0 2rem 0; text-align: left; }
        .pricing-list li { padding: 0.6rem 0; color: #666; font-size: 14px; border-bottom: 1px solid #f5f5f5; }
        .dark-mode .pricing-list li { color: #aaa; border-bottom-color: #3a3a3a; }
        .pricing-list li:before { content: "✦ "; color: #8B1538; font-size: 10px; margin-right: 0.5rem; }

        /* AUTH */
        .auth-form { max-width: 420px; margin: 4rem auto; padding: 2.5rem; background: white; border-radius: 16px; border: 1.5px solid #e8e8e8; }
        .dark-mode .auth-form { background: #2a2a2a; border-color: #3a3a3a; }
        .auth-form h2 { text-align: center; margin-bottom: 2rem; font-size: 30px; }
        .form-group { margin-bottom: 1.25rem; }
        .form-group label { display: block; margin-bottom: 0.4rem; font-weight: 600; font-size: 13px; color: #555; }
        .dark-mode .form-group label { color: #aaa; }
        .form-group input, .form-group select, .form-group textarea { width: 100%; padding: 11px 14px; border: 1.5px solid #e0e0e0; border-radius: 10px; font-size: 14px; font-family: 'Poppins', sans-serif; background: white; color: #1a1a1a; transition: all 0.3s; }
        .dark-mode .form-group input, .dark-mode .form-group select, .dark-mode .form-group textarea { background: #333; border-color: #4a4a4a; color: #f0ede8; }
        .form-group input::placeholder, .form-group textarea::placeholder { color: #aaa; }
        .form-group input:focus, .form-group select:focus, .form-group textarea:focus { outline: none; border-color: #8B1538; box-shadow: 0 0 0 3px rgba(139,21,56,0.08); }
        .error { color: #8B1538; font-size: 13px; margin-top: 0.5rem; }
        .loading-text { text-align: center; color: #888; font-size: 13px; margin-top: 1rem; font-style: italic; }

        /* DASHBOARD */
        .dashboard-container { max-width: 680px; margin: 0 auto; padding: 0 1.25rem 2rem; }
        .dashboard-hero { text-align: center; padding: 2.5rem 1rem 1.5rem; }
        .dashboard-greeting { font-family: 'Cormorant Garamond', serif; font-style: italic; font-size: 42px; color: #8B1538; margin-bottom: 0.75rem; line-height: 1.2; }
        .dark-mode .dashboard-greeting { color: #c41e3a; }
        .dashboard-quote { font-size: 13px; color: #999; font-style: italic; max-width: 420px; margin: 0 auto; line-height: 1.7; }

        /* ACTION CARDS */
        .action-cards-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 0.875rem; margin: 1.75rem 0; }
        .action-card-premium { background: white; border: 1.5px solid #ede8e3; border-radius: 16px; padding: 1.5rem 1.25rem; cursor: pointer; transition: all 0.3s ease; text-align: left; display: flex; flex-direction: column; gap: 0.5rem; min-height: 110px; }
        .dark-mode .action-card-premium { background: #2a2a2a; border-color: #3a3a3a; }
        .action-card-premium:hover { border-color: #8B1538; box-shadow: 0 6px 20px rgba(139,21,56,0.12); transform: translateY(-2px); }
        .dark-mode .action-card-premium:hover { box-shadow: 0 6px 20px rgba(139,21,56,0.25); }
        .action-card-icon { font-size: 26px; }
        .action-card-title { font-family: 'Cormorant Garamond', serif; font-size: 19px; font-weight: 600; color: #1a1a1a; line-height: 1.2; }
        .dark-mode .action-card-title { color: #f0ede8; }
        .action-card-desc { font-size: 11px; color: #999; line-height: 1.5; }

        /* STATS STRIP */
        .stats-strip { display: grid; grid-template-columns: repeat(3, 1fr); gap: 0.875rem; margin: 0 0 1.75rem; }
        .stat-card { background: white; border: 1.5px solid #ede8e3; border-radius: 14px; padding: 1rem; text-align: center; transition: all 0.3s; }
        .dark-mode .stat-card { background: #2a2a2a; border-color: #3a3a3a; }
        .stat-card:hover { border-color: rgba(139,21,56,0.3); }
        .stat-number { font-size: 26px; font-weight: 700; color: #8B1538; margin-bottom: 0.2rem; font-family: 'Cormorant Garamond', serif; }
        .stat-label { font-size: 10px; color: #aaa; text-transform: uppercase; letter-spacing: 0.5px; font-weight: 600; }

        /* ANNOUNCEMENT */
        .announcement-banner { background: linear-gradient(135deg, rgba(139,21,56,0.06), rgba(139,21,56,0.02)); border: 1px solid rgba(139,21,56,0.15); border-left: 3px solid #8B1538; padding: 1rem 1.25rem; border-radius: 10px; margin-bottom: 1.5rem; font-size: 14px; }

        /* DAILY PICK */
        .daily-pick { background: linear-gradient(135deg, rgba(139,21,56,0.05), rgba(139,21,56,0.02)); border: 1.5px solid rgba(139,21,56,0.15); border-radius: 14px; padding: 1.5rem; }
        .daily-pick-header { display: flex; align-items: center; gap: 0.5rem; margin-bottom: 0.75rem; }
        .daily-pick-label { font-size: 11px; font-weight: 600; color: #8B1538; text-transform: uppercase; letter-spacing: 0.5px; }
        .daily-pick-text { font-size: 14px; line-height: 1.75; color: #555; font-style: italic; }
        .dark-mode .daily-pick-text { color: #c0b8b2; }

        /* SECTION CARDS */
        .section-card { background: white; border: 1.5px solid #ede8e3; border-radius: 14px; padding: 1.75rem; margin-bottom: 1.25rem; }
        .dark-mode .section-card { background: #2a2a2a; border-color: #3a3a3a; }
        .section-header { margin-bottom: 1.25rem; }
        .section-header h3 { font-size: 22px; }

        /* PROFILE */
        .profile-header { display: flex; gap: 1.5rem; align-items: flex-start; margin-bottom: 2rem; }
        .hexagon-photo { width: 110px; height: 110px; clip-path: polygon(50% 0%, 100% 25%, 100% 75%, 50% 100%, 0% 75%, 0% 25%); background: linear-gradient(135deg, #8B1538, #c41e3a); display: flex; align-items: center; justify-content: center; font-size: 48px; box-shadow: 0 8px 30px rgba(139,21,56,0.25); flex-shrink: 0; }
        .profile-name { font-style: italic; font-size: 28px; margin-bottom: 0.25rem; }
        .profile-username { color: #999; font-size: 14px; margin-bottom: 0.5rem; }
        .profile-meta { color: #888; font-size: 13px; }
        .bio-box { width: 100%; background: white; border: 1.5px solid #e0e0e0; border-radius: 10px; padding: 1rem; font-size: 14px; line-height: 1.8; min-height: 100px; resize: vertical; font-family: 'Poppins', sans-serif; color: #1a1a1a; margin-bottom: 1rem; transition: all 0.3s; }
        .dark-mode .bio-box { background: #333; border-color: #4a4a4a; color: #f0ede8; }
        .bio-box:focus { outline: none; border-color: #8B1538; }
        .bio-box::placeholder { color: #bbb; }
        .widget-toggles { display: grid; grid-template-columns: repeat(auto-fit, minmax(160px, 1fr)); gap: 0.75rem; }
        .widget-card { background: white; border: 1.5px solid #e0e0e0; border-radius: 10px; padding: 1.25rem; cursor: pointer; transition: all 0.3s; display: flex; align-items: center; gap: 0.75rem; }
        .dark-mode .widget-card { background: #2a2a2a; border-color: #3a3a3a; }
        .widget-card.active { border-color: #8B1538; background: rgba(139,21,56,0.04); }
        .widget-checkbox { width: 18px; height: 18px; accent-color: #8B1538; cursor: pointer; }
        .widget-label-text { font-size: 14px; font-weight: 500; }

        /* CRIMSON CHAT */
        .crimson-container { max-width: 780px; margin: 0 auto; padding: 0 1.25rem 2rem; }
        .crimson-header { text-align: center; padding: 1.75rem 1rem 1.25rem; }
        .crimson-title { font-family: 'Cormorant Garamond', serif; font-style: italic; font-size: 38px; color: #8B1538; margin-bottom: 0.25rem; }
        .crimson-subtitle { color: #999; font-size: 13px; }
        .crimson-counter { display: inline-block; background: rgba(139,21,56,0.08); color: #8B1538; padding: 5px 14px; border-radius: 20px; font-size: 12px; font-weight: 600; margin-top: 0.5rem; }
        .crimson-express-notice { margin-top: 0.5rem; font-size: 11px; color: #aaa; font-style: italic; }
        .chat-window { background: white; border: 1.5px solid #ede8e3; border-radius: 16px; min-height: 460px; max-height: 560px; display: flex; flex-direction: column; box-shadow: 0 4px 24px rgba(0,0,0,0.04); overflow: hidden; }
        .dark-mode .chat-window { background: #2a2a2a; border-color: #3a3a3a; }
        .chat-messages { flex: 1; overflow-y: auto; padding: 1.5rem; display: flex; flex-direction: column; gap: 1rem; }
        .chat-message { max-width: 80%; padding: 1rem 1.25rem; border-radius: 16px; line-height: 1.65; font-size: 14px; word-wrap: break-word; white-space: pre-wrap; animation: msgIn 0.25s ease-out; }
        @keyframes msgIn { from { opacity: 0; transform: translateY(8px); } to { opacity: 1; transform: translateY(0); } }
        .chat-message.user { align-self: flex-end; background: #8B1538; color: white; border-bottom-right-radius: 4px; }
        .chat-message.crimson { align-self: flex-start; background: #f7f4f1; color: #1a1a1a; border-bottom-left-radius: 4px; }
        .dark-mode .chat-message.crimson { background: #333; color: #f0ede8; }
        .chat-loading { align-self: flex-start; background: #f7f4f1; padding: 1rem 1.25rem; border-radius: 16px; border-bottom-left-radius: 4px; display: flex; gap: 5px; align-items: center; }
        .dark-mode .chat-loading { background: #333; }
        .chat-loading-dot { width: 7px; height: 7px; background: #8B1538; border-radius: 50%; animation: dot 1.4s infinite; }
        .chat-loading-dot:nth-child(2) { animation-delay: 0.2s; }
        .chat-loading-dot:nth-child(3) { animation-delay: 0.4s; }
        @keyframes dot { 0%, 80%, 100% { opacity: 0.3; transform: scale(0.8); } 40% { opacity: 1; transform: scale(1); } }
        .chat-input-area { padding: 1rem 1.25rem 1.25rem; border-top: 1px solid #f0ebe6; display: flex; gap: 0.5rem; align-items: center; }
        .dark-mode .chat-input-area { border-top-color: #3a3a3a; }
        .chat-input { flex: 1; padding: 12px 18px; border: 1.5px solid #e0e0e0; border-radius: 30px; font-size: 14px; font-family: 'Poppins', sans-serif; background: white; color: #1a1a1a; transition: all 0.3s; }
        .dark-mode .chat-input { background: #333; border-color: #4a4a4a; color: #f0ede8; }
        .chat-input:focus { outline: none; border-color: #8B1538; }
        .chat-send-btn { background: linear-gradient(135deg, #8B1538, #c41e3a); color: white; border: none; width: 44px; height: 44px; border-radius: 50%; cursor: pointer; transition: all 0.3s; display: flex; align-items: center; justify-content: center; font-size: 16px; flex-shrink: 0; }
        .chat-send-btn:hover { transform: scale(1.05); box-shadow: 0 4px 12px rgba(139,21,56,0.3); }
        .chat-send-btn:disabled { background: #ccc; cursor: not-allowed; transform: none; box-shadow: none; }
        .chat-empty { text-align: center; padding: 2.5rem 1rem; color: #aaa; }
        .chat-empty h3 { font-family: 'Cormorant Garamond', serif; font-style: italic; font-size: 24px; color: #8B1538; margin-bottom: 0.75rem; }
        .chat-empty p { font-size: 14px; margin-bottom: 0.4rem; }
        .chat-suggestions { display: flex; flex-wrap: wrap; gap: 0.5rem; justify-content: center; margin-top: 1.25rem; }
        .chat-suggestion { background: rgba(139,21,56,0.06); border: 1px solid rgba(139,21,56,0.15); color: #8B1538; padding: 7px 14px; border-radius: 20px; font-size: 12px; cursor: pointer; transition: all 0.3s; font-family: 'Poppins', sans-serif; }
        .chat-suggestion:hover { background: #8B1538; color: white; }
        .chat-limit-banner { background: rgba(139,21,56,0.05); border: 1.5px solid rgba(139,21,56,0.2); padding: 1.5rem; border-radius: 14px; text-align: center; margin-top: 1rem; }
        .chat-limit-banner h3 { color: #8B1538; font-size: 20px; margin-bottom: 0.5rem; }
        .chat-limit-banner p { color: #777; font-size: 14px; margin-bottom: 1rem; }

        /* RESOURCES */
        .resources-container { max-width: 900px; margin: 0 auto; padding: 1.5rem 1.25rem 2rem; }
        .page-title { font-size: 32px; font-style: italic; color: #1a1a1a; margin-bottom: 0.25rem; }
        .dark-mode .page-title { color: #f0ede8; }
        .page-subtitle { color: #999; font-size: 14px; margin-bottom: 2rem; }
        .resource-section { margin-bottom: 2.5rem; }
        .resource-section h3 { font-size: 20px; margin-bottom: 1.25rem; color: #8B1538; font-style: italic; }
        .template-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(260px, 1fr)); gap: 1rem; }
        .template-card { background: white; border: 1.5px solid #ede8e3; border-radius: 12px; padding: 1.25rem; transition: all 0.3s; }
        .dark-mode .template-card { background: #2a2a2a; border-color: #3a3a3a; }
        .template-card:hover { border-color: rgba(139,21,56,0.3); }
        .template-card h4 { font-size: 15px; margin-bottom: 0.75rem; }
        .template-content { background: rgba(139,21,56,0.04); padding: 0.75rem; border-radius: 8px; font-size: 13px; margin: 0.75rem 0; color: #555; font-style: italic; line-height: 1.5; }
        .dark-mode .template-content { background: rgba(139,21,56,0.08); color: #c0b8b2; }
        .course-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(240px, 1fr)); gap: 1rem; }
        .course-card { background: white; border: 1.5px solid #ede8e3; border-radius: 12px; padding: 1.5rem; text-align: center; transition: all 0.3s; }
        .dark-mode .course-card { background: #2a2a2a; border-color: #3a3a3a; }
        .course-card:hover { border-color: rgba(139,21,56,0.3); transform: translateY(-2px); }
        .course-icon { font-size: 36px; margin-bottom: 0.75rem; }
        .course-title { font-size: 16px; font-weight: 600; margin-bottom: 0.5rem; }
        .course-desc { font-size: 13px; color: #999; margin-bottom: 1rem; }

                                            {chatHistory.length === 0 ? (
                                                <div className="chat-empty">
                                                    <h3>Hey, {currentUser.name} 🌹</h3>
                                                    <p>I'm Crimson — your content coach.</p>
                                                    <p>I know your niche ({currentUser.niche}) and your tone ({currentUser.tone}).</p>
                                                    <div className="chat-suggestions" style={{ marginTop: '1.5rem' }}>
                                                        {CRIMSON_SUGGESTIONS.map((s, i) => (
                                                            <button key={i} className="chat-suggestion" onClick={() => handleSendMessage(s)}>{s}</button>
                                                        ))}
                                                    </div>
                                                </div>
                                            ) : chatHistory.map((msg, i) => (
                                                <div key={i} className={`chat-message ${msg.role}`}>{msg.content}</div>
                                            ))}
                                            {isChatLoading && (
                                                <div className="chat-loading">
                                                    <div className="chat-loading-dot"></div>
                                                    <div className="chat-loading-dot"></div>
                                                    <div className="chat-loading-dot"></div>
                                                </div>
                                            )}
                                            <div ref={chatEndRef}></div>
                                        </div>
                                        <div className="chat-input-area">
                                            <input type="text" className="chat-input" placeholder="Ask Crimson anything..." value={currentMessage}
                                                onChange={(e) => setCurrentMessage(e.target.value)}
                                                onKeyDown={(e) => e.key === 'Enter' && handleSendMessage()}
                                                disabled={isChatLoading || chatLimitReached} />
                                            <button className="chat-send-btn" onClick={() => handleSendMessage()} disabled={isChatLoading || !currentMessage.trim() || chatLimitReached}>→</button>
                                        </div>
                                    </div>
                                    {chatLimitReached && tier !== 'pro' && (
                                        <div className="chat-limit-banner">
                                            <h3>Daily limit reached 🌹</h3>
                                            <p>Upgrade to Pro for unlimited Crimson chats, priority access, and so much more.</p>
                                            <button className="btn btn-crimson">Upgrade to Pro — $29/mo</button>
                                        </div>
                                    )}
                                </div>
                            )}

                            {/* CALENDAR */}
                            {currentPage === 'calendar' && (
                                <div className="generic-container">
                                    <div className="coming-soon-card">
                                        <div className="coming-soon-icon">📅</div>
                                        <h2>Content Calendar</h2>
                                        <p>Plan your week, schedule posts, and never run out of ideas. This is coming very soon — and it's going to be beautiful.</p>
                                    </div>
                                </div>
                            )}

                            {/* COMMUNITY */}
                            {currentPage === 'community' && (
                                <div className="generic-container">
                                    <div className="coming-soon-card">
                                        <div className="coming-soon-icon">👥</div>
                                        <h2>Creator Community</h2>
                                        <p>Connect with creators in your niche, join Power Hour calls, and grow together. Coming soon.</p>
                                    </div>
                                </div>
                            )}

                            {/* RESOURCES */}
                            {currentPage === 'resources' && (
                                <div className="resources-container">
                                    <div className="page-title">Resources</div>
                                    <div className="page-subtitle">Templates, tools, and learning — all in one place</div>

                                    <div className="resource-section">
                                        <h3>📸 Instagram Hooks</h3>
                                        <div className="template-grid">
                                            {INSTAGRAM_TEMPLATES.map(t => (
                                                <div key={t.id} className="template-card">
                                                    <h4>{t.title}</h4>
                                                    <div className="template-content">{t.content}</div>
                                                    <button className="btn btn-secondary btn-small" onClick={() => { navigator.clipboard.writeText(t.content); showNotif('Copied! 🌹'); }}>Copy</button>
                                                </div>
                                            ))}
                                        </div>
                                    </div>

                                    <div className="resource-section">
                                        <h3>🎬 TikTok Formats</h3>
                                        <div className="template-grid">
                                            {TIKTOK_TEMPLATES.map(t => (
                                                <div key={t.id} className="template-card">
                                                    <h4>{t.title}</h4>
                                                    <div className="template-content">{t.content}</div>
                                                    <button className="btn btn-secondary btn-small" onClick={() => { navigator.clipboard.writeText(t.content); showNotif('Copied! 🌹'); }}>Copy</button>
                                                </div>
                                            ))}
                                        </div>
                                    </div>

                                    <div className="resource-section">
                                        <h3>🎓 Courses & Learning</h3>
                                        <div className="course-grid">
                                            <div className="course-card">
                                                <div className="course-icon">🚀</div>
                                                <div className="course-title">SWC 2.0</div>
                                                <div className="course-desc">The complete creator growth course — from zero to thriving</div>
                                                <span className="coming-soon-badge">Coming Soon</span>
                                            </div>
                                            <div className="course-card">
                                                <div className="course-icon">📈</div>
                                                <div className="course-title">Algorithm Mastery</div>
                                                <div className="course-desc">How to work with TikTok & Instagram algorithms in 2025</div>
                                                <span className="coming-soon-badge">Coming Soon</span>
                                            </div>
                                            <div className="course-card">
                                                <div className="course-icon">💰</div>
                                                <div className="course-title">Monetize Your Content</div>
                                                <div className="course-desc">Turn followers into income — brand deals, products, and more</div>
                                                <span className="coming-soon-badge">Coming Soon</span>
                                            </div>
                                        </div>
                                    </div>
                                </div>
                            )}

                            {/* PROFILE */}
                            {currentPage === 'profile' && (
                                <div className="generic-container">
                                    <div className="section-card">
                                        <div className="profile-header">
                                            <div className="hexagon-photo">📸</div>
                                            <div>
                                                <div className="profile-name">{currentUser.name}</div>
                                                <div className="profile-username">@{currentUser.username}</div>
                                                <div className="profile-meta">{currentUser.niche} · {currentUser.tone} tone · {tier === 'pro' ? '⭐ Pro' : '🌱 Starter'}</div>
                                            </div>
                                        </div>
                                        <div>
                                            <label className="form-group" style={{ fontWeight: 600, fontSize: 13, color: '#555', display: 'block', marginBottom: '0.5rem' }}>Your Bio</label>
                                            <textarea className="bio-box" value={profileBio} onChange={(e) => { setProfileBio(e.target.value); setCurrentUser({...currentUser, bio: e.target.value}); }} placeholder="Tell your audience about yourself..." />
                                            <button className="btn btn-crimson btn-small" onClick={() => showNotif('Bio saved! 🌹')}>Save Bio</button>
                                        </div>
                                    </div>
                                    <div className="section-card">
                                        <div className="section-header"><h3>Account</h3></div>
                                        <button className="btn btn-secondary" onClick={handleLogout} style={{ marginLeft: 0 }}>Sign Out</button>
                                        {isAdmin && <button className="btn" onClick={() => setCurrentPage('admin')} style={{ marginLeft: '0.5rem' }}>Admin Panel <span className="badge">ADMIN</span></button>}
                                    </div>
                                </div>
                            )}

                            {/* ADMIN */}
                            {currentPage === 'admin' && isAdmin && (
                                <div className="generic-container">
                                    <div className="section-card">
                                        <div className="section-header"><h3>Admin Panel</h3></div>
                                        <p style={{ color: '#999', fontSize: 14 }}>Full admin tools coming soon — announcement editor, user management, and more.</p>
                                    </div>
                                </div>
                            )}

                        </div>

                        {/* BOTTOM NAV */}
                        <nav className="bottom-nav">
                            <button className={`bottom-nav-item ${currentPage === 'app' ? 'active' : ''}`} onClick={() => setCurrentPage('app')}>
                                <span className="bottom-nav-icon">🏠</span>
                                Dashboard
                            </button>
                            <button className={`bottom-nav-item ${currentPage === 'crimson' ? 'active' : ''}`} onClick={() => setCurrentPage('crimson')}>
                                <span className="bottom-nav-icon">🌹</span>
                                Crimson
                            </button>
                            <button className={`bottom-nav-item ${currentPage === 'calendar' ? 'active' : ''}`} onClick={() => setCurrentPage('calendar')}>
                                <span className="bottom-nav-icon">📅</span>
                                Calendar
                            </button>
                            <button className={`bottom-nav-item ${currentPage === 'community' ? 'active' : ''}`} onClick={() => setCurrentPage('community')}>
                                <span className="bottom-nav-icon">👥</span>
                                Community
                            </button>
                            <button className={`bottom-nav-item ${currentPage === 'resources' ? 'active' : ''}`} onClick={() => setCurrentPage('resources')}>
                                <span className="bottom-nav-icon">📚</span>
                                Resources
                            </button>
                        </nav>

                        {showNotification && <div className="notification">{notificationText}</div>}
                    </div>
                );
            }

            return null;
        }

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<ContentStudioApp />);
    </script>
</body>
</html>
